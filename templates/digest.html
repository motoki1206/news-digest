<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#c9511c" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#16171a" media="(prefers-color-scheme: dark)">
<title>{{DATE}} の AI開発ダイジェスト</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="container">

<header class="site">
  <h1>AI開発ダイジェスト</h1>
  <div class="date">{{DATE_LABEL}}</div>
</header>

<p class="lede">{{LEDE}}</p>

<!--
  Claudeが毎朝ここから下を差し替える。
  セクション構成:
    📣 トップピック (3件) → class="pick"
    🤖 Claude / Anthropic
    🛠️ AI開発ツール (Cursor / Copilot / Codex など)
    📚 技術Tips・事例 (Zenn / Qiita)
  各 <article.item> は：
    <article class="item">
      <h3><a href="URL">タイトル</a></h3>
      <div class="meta"><span class="source">元サイト</span><span>published JST</span></div>
      <p class="body">日本語要約 2〜3行</p>
    </article>
-->

{{CONTENT}}

<footer class="site">
  <span>生成: {{GENERATED_AT}}</span>
  <a href="./archive/">過去のダイジェスト →</a>
</footer>

</div>
</body>
</html>
